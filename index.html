<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --good-day: #fbbf24; 
            --health: #10b981; 
            --memory: #22d3ee; 
            --time: #818cf8; 
            --rain: #60a5fa; 
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh; 
        }

        h1 { 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin: 40px 0; 
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .container { 
            width: 100%; 
            max-width: 340px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .app-link { 
            background: var(--card); 
            padding: 18px 20px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: var(--text); 
            display: flex; 
            align-items: center; 
            gap: 15px;
            transition: 0.2s;
            border-left: 5px solid transparent;
        }

        .app-link:active { transform: scale(0.98); background: #24334a; }

        .icon { font-size: 1.4rem; width: 24px; text-align: center; }
        .label { font-weight: 600; letter-spacing: 1px; font-size: 0.85rem; }

        .good-day { border-left-color: var(--good-day); }
        .health { border-left-color: var(--health); }
        .memory { border-left-color: var(--memory); }
        .time { border-left-color: var(--time); }
        .rain { border-left-color: var(--rain); }

    </style>
</head>
<body>

    <h1>Daily</h1>

    <div class="container">
        <!-- Good Day -->
        <a href="../goodday/" class="app-link good-day">
            <span class="icon">✨</span>
            <span class="label">GOOD DAY</span>
        </a>

        <!-- Good Health -->
        <a href="../health/" class="app-link health">
            <span class="icon">🥗</span>
            <span class="label">GOOD HEALTH</span>
        </a>

        <!-- 24 Hour Memory -->
        <a href="../quicklist/" class="app-link memory">
            <span class="icon">🧠</span>
            <span class="label">24 HOUR MEMORY</span>
        </a>

        <!-- Time -->
        <a href="../time/" class="app-link time">
            <span class="icon">🕒</span>
            <span class="label">TIME</span>
        </a>

        <!-- Rain -->
        <a href="../rain/" class="app-link rain">
            <span class="icon">🌧️</span>
            <span class="label">RAIN</span>
        </a>
    </div>

</body>
</html>
