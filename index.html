<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Hub</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent-health: #10b981;
            --accent-memory: #22d3ee;
            --accent-time: #818cf8; /* New Time Accent */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 30px 0;
            color: var(--text);
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--card);
            padding: 25px 15px;
            border-radius: 24px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:active {
            transform: scale(0.95);
            background: #2d3a4f;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Specific Accents */
        .health { border-bottom: 4px solid var(--accent-health); }
        .memory { border-bottom: 4px solid var(--accent-memory); }
        .time { border-bottom: 4px solid var(--accent-time); }

    </style>
</head>
<body>

    <h1>Daily</h1>

    <div class="grid">
        <!-- Health App -->
        <a href="https://davidkmck.github.io/health/" class="card health">
            <span class="icon">🥗</span>
            <span class="card-title">HEALTH</span>
        </a>

        <!-- Memory App -->
        <a href="https://davidkmck.github.io/quicklist/" class="card memory">
            <span class="icon">🧠</span>
            <span class="card-title">MEMORY</span>
        </a>

        <!-- Time App (New) -->
        <a href="https://davidkmck.github.io/time/" class="card time">
            <span class="icon">🕒</span>
            <span class="card-title">TIME</span>
        </a>

        <!-- Placeholder for future apps -->
        <div class="card" style="opacity: 0.3; border-bottom: 4px solid transparent;">
            <span class="icon">➕</span>
            <span class="card-title">SOON</span>
        </div>
    </div>

</body>
</html>
