<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Daily</title>
    
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="1778634001976.png">

    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --nav-bg: #1e293b;
            --accent: #38bdf8;
            --nav-height: 75px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; 
        }

        /* The App Container */
        #app-viewport {
            width: 100%;
            height: calc(100% - var(--nav-height));
            border: none;
            display: block;
            background-color: var(--bg-color);
        }

        /* Bottom Navigation */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: var(--nav-height);
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* Fix for Pixel/iPhone gestures */
            border-top: 1px solid #334155;
            box-sizing: border-box;
        }

        .nav-item {
            background: none;
            border: none;
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex: 1;
            transition: all 0.2s ease;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .icon {
            font-size: 22px;
        }

        /* Hide scrollbars in the iframe */
        #app-viewport::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Default app is Good Day -->
    <iframe id="app-viewport" src="./apps/good-day/index.html" name="app-frame"></iframe>

    <nav>
        <button class="nav-item active" onclick="loadApp('./apps/good-day/index.html', this)">
            <span class="icon">☀️</span>
            <span>Day</span>
        </button>
        <button class="nav-item" onclick="loadApp('./apps/good-health/index.html', this)">
            <span class="icon">⚖️</span>
            <span>Health</span>
        </button>
        <button class="nav-item" onclick="loadApp('./apps/time/index.html', this)">
            <span class="icon">🕒</span>
            <span>Time</span>
        </button>
        <button class="nav-item" onclick="loadApp('./apps/24-hour-memory/index.html', this)">
            <span class="icon">🧠</span>
            <span>Memory</span>
        </button>
    </nav>

    <script>
        function loadApp(path, element) {
            const viewport = document.getElementById('app-viewport');
            
            // Avoid reloading the same app
            if (viewport.src.includes(path.replace('./', ''))) return;

            viewport.src = path;

            // Update UI Active State
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log("Daily Hub Scope:", reg.scope))
                .catch(err => console.log("PWA failed:", err));
            });
        }
    </script>
</body>
</html>
