<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Daily</title>
    
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="1778634001976.png">

    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --nav-bg: #1e293b;
            --accent: #38bdf8;
            --nav-height: 75px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; 
        }

        /* The App Container */
        #app-viewport {
            width: 100%;
            height: calc(100% - var(--nav-height));
            border: none;
            display: block;
            background-color: var(--bg-color);
        }

        /* Bottom Navigation */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: var(--nav-height);
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* Fix for Pixel/iPhone gestures */
            border-top: 1px solid #334155;
            box-sizing: border-box;
        }

        .nav-item {
            background: none;
            border: none;
            color: #64748b;
            font-size: 11px; /* Slightly tightened for 7 items */
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex: 1;
            transition: all 0.2s ease;
            min-width: 0;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .icon {
            font-size: 20px; /* Slightly reduced to keep spacing precise */
        }

        /* Hide scrollbars in the iframe */
        #app-viewport::-webkit-scrollbar {
            display: none;
        }

        /* Backup Control Sheet Modal */
        .backup-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - var(--nav-height));
            background-color: rgba(15, 23, 42, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .backup-card {
            background: var(--nav-bg);
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .backup-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 400;
            color: var(--text-color);
        }

        .backup-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .backup-btn {
            background: #334155;
            color: var(--text-color);
            border: 1px solid #475569;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .backup-btn:active {
            background: #475569;
        }

        .backup-btn.primary {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
        }

        .backup-btn.primary:active {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

    <!-- Default app is Good Day -->
    <iframe id="app-viewport" src="./apps/good-day/index.html" name="app-frame"></iframe>

    <!-- Dedicated Backup Modal Sheet Container -->
    <div id="backupModal" class="backup-modal">
        <div class="backup-card">
            <div class="backup-title">Data Protection</div>
            <div class="backup-desc">Download a complete copy of all app histories to your local device storage, or restore an existing backup file.</div>
            
            <button class="backup-btn primary" onclick="exportData()">📥 Export Backup File</button>
            
            <input type="file" id="importFile" style="display:none" onchange="importData(this)">
            <button class="backup-btn" onclick="document.getElementById('importFile').click()">📤 Import Backup File</button>
        </div>
    </div>

    <nav>
        <button class="nav-item active" onclick="loadApp('./apps/good-day/index.html', this)">
            <span class="icon">☀️</span>
            <span>Day</span>
        </button>
        <button class="nav-item" onclick="loadApp('./apps/good-health/index.html', this)">
            <span class="icon">⚖️</span>
            <span>Health</span>
        </button>
        <button class="nav-item" onclick="loadApp('./apps/24-hour-memory/index.html', this)">
            <span class="icon">🧠</span>
            <span>Mem</span>
        </button>    
        <button class="nav-item" onclick="loadApp('./apps/poop-tracker/index.html', this)">
            <span class="icon">💩</span>
            <span>Poop</span>
        </button>
        <button class="nav-item" onclick="loadApp('./apps/time/index.html', this)">
            <span class="icon">🕒</span>
            <span>Time</span>
        </button>
        <button class="nav-item" onclick="loadApp('./apps/rain/index.html', this)">
            <span class="icon">🌧️</span>
            <span>Rain</span>
        </button>       
        <button class="nav-item" onclick="toggleBackupView(this)">
            <span class="icon">🛡️</span>
            <span>Backup</span>
        </button>
    </nav>

    <script>
        function loadApp(path, element) {
            // Hide the backup container panel if open
            document.getElementById('backupModal').style.display = 'none';

            const viewport = document.getElementById('app-viewport');
            
            // Avoid reloading the same app
            if (viewport.src.includes(path.replace('./', ''))) return;

            viewport.src = path;

            // Update UI Active State
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function toggleBackupView(element) {
            // Display backup utility view interface overlay instead of shifting iframe source location
            document.getElementById('backupModal').style.display = 'flex';
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function exportData() {
            const backupData = {};
            // Loop and pull every key saved locally inside this shared domain scope slice
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                backupData[key] = localStorage.getItem(key);
            }
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `daily_hub_backup_${new Date().toLocaleDateString('en-CA')}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importData(input) {
            if (!input.files.length) return;
            
            const reader = new FileReader();
            reader.onload = function() {
                try {
                    const importedData = JSON.parse(reader.result);
                    
                    // Clear existing memory before dropping the backup values inside
                    localStorage.clear();
                    
                    Object.keys(importedData).forEach(key => {
                        localStorage.setItem(key, importedData[key]);
                    });
                    
                    alert("All data sets restored successfully! Updating framework view...");
                    window.location.reload();
                } catch (e) {
                    alert("Failed to parse file. Ensure it is a valid Daily Hub backup .json file.");
                }
            };
            reader.readAsText(input.files[0]);
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log("Daily Hub Scope:", reg.scope))
                .catch(err => console.log("PWA failed:", err));
            });
        }
    </script>
</body>
</html>
